<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handy-Text | Prompt Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-titles">
                <h1>Handy-Text</h1>
                <p>Your personal prompt repository</p>
            </div>
            <!-- Expanded Navigation for Filtering -->
            <nav class="header-nav">
                <button id="navAll" class="nav-btn active">All</button>
                <button id="navFavorites" class="nav-btn">★ Favorites</button>
                <button id="navPinned" class="nav-btn">📌 Pinned</button>
                <button id="navTrash" class="nav-btn">🗑️ Trash <span id="trashCount" class="badge">0</span></button>
            </nav>
        </header>

        <!-- MAIN VIEW (All, Favorites, Pinned) -->
        <main id="viewMain">
            
            <!-- Dynamic Header for current view -->
            <div class="view-header" id="viewHeader" style="display: none;">
                <h2 id="viewTitle">View</h2>
                <p id="viewSubtitle">Description</p>
            </div>

            <!-- Form for Adding/Editing Prompts (Hidden in Fav/Pinned views to save space) -->
            <section class="form-card" id="formSection">
                <h2 id="formTitle">Add New Prompt</h2>
                <form id="promptForm">
                    <input type="hidden" id="promptId">
                    
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" placeholder="e.g., Code Review Prompt" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" placeholder="e.g., Development, SEO, General" required>
                    </div>

                    <div class="form-group">
                        <label for="content">Prompt Text</label>
                        <textarea id="content" rows="4" placeholder="Type your prompt here..." required></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-primary">Save Prompt</button>
                    <button type="button" id="cancelBtn" class="btn-secondary hidden">Cancel Edit</button>
                </form>
            </section>

            <!-- Search and Filter -->
            <section class="controls">
                <input type="text" id="searchInput" placeholder="Search prompts by title or category...">
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <!-- Categories populated dynamically -->
                </select>
            </section>

            <!-- Active Prompt Cards Grid -->
            <section class="prompt-grid" id="promptGrid">
                <!-- Active cards injected here -->
            </section>
        </main>

        <!-- TRASH VIEW (Deleted Prompts) -->
        <main id="viewTrash" class="hidden">
            <div class="trash-header">
                <h2>Trash</h2>
                <p>Deleted prompts stay here. You can restore them or delete them permanently.</p>
            </div>
            
            <section class="prompt-grid" id="trashGrid">
                <!-- Trash cards injected here -->
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
